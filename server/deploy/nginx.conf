# Cloud-Obsidian Nginx reverse proxy configuration
# Place at: /etc/nginx/sites-available/cloud-obsidian
# Then: ln -s /etc/nginx/sites-available/cloud-obsidian /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;  # Replace with your domain, or leave _ for IP-based access

    client_max_body_size 50m;

    # API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # WebSocket reverse proxy
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;  # Long-lived WS connection
    }

    # Health check
    location /api/health {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
